name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  backend-lint-build:
    name: Backend (Python) — lint & sanity build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install flake8

      - name: Lint with flake8 (errors only — won't fail on style nits)
        run: |
          # Fail only on actual errors (syntax errors, undefined names).
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Full report, non-blocking, just for visibility in logs.
          flake8 . --count --exit-zero --max-line-length=120 --statistics

      - name: Byte-compile check (catches import/syntax issues fast)
        run: python -m py_compile $(git ls-files '*.py')

      - name: Run tests (soft — passes if no tests exist yet)
        run: |
          pip install pytest
          if [ -d tests ] || ls test_*.py 1> /dev/null 2>&1; then
            pytest -q
          else
            echo "No test suite found yet — skipping (add tests/ to make this a hard gate)."
          fi

  frontend-lint-build:
    name: Frontend (Vite) — lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (soft — only if an eslint config exists)
        run: |
          if npm run | grep -q "lint"; then
            npm run lint
          else
            echo "No 'lint' script defined — skipping."
          fi

      - name: Build
        run: npm run build

  docker-build-validation:
    name: Docker images — build only (no push)
    runs-on: ubuntu-latest
    needs: [backend-lint-build, frontend-lint-build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: secureqa-sentinel-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: secureqa-sentinel-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max